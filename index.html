              newClasses.push({ classId: cId, className: `${g}年${c}組`, students: [] });
            }
          }
        });
        setAppData({ ...appData, settings: { ...appData.settings, grades: gradesConfig }, classes: newClasses });
        showToast("クラス構成を更新しました。", "success");
      };

      const handleStudentChange = (id, field, val) => {
        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: c.students.map(s => s.id === id ? { ...s, [field]: val } : s)
          } : c)
        });
      };

      const addStudent = () => {
        if(!activeClass) return;
        const nextNum = activeClass.students.length > 0 ? Math.max(...activeClass.students.map(s=>s.number)) + 1 : 1;
        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: [...c.students, { id: `s_${Date.now()}`, number: nextNum, name: "", furigana: "", gender: "その他", status: "在籍" }]
          } : c)
        });
      };

      const removeStudent = (studentId) => {
        if(!window.confirm("【警告】\nこの生徒を完全に削除すると、過去の評価データも全て消去されてしまいます。\n\n※年度途中の転出等の場合は、削除せずに「状態」を「転出」に変更することをお勧めします。\n\n本当に完全に削除してよろしいですか？")) return;
        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: c.students.filter(s => s.id !== studentId)
          } : c)
        });
      };

      const processBulkImport = () => {
        if(!activeClass || !bulkImport.text.trim()) { setBulkImport({ show: false, text: '' }); return; }
        const lines = bulkImport.text.split('\n').filter(l => l.trim() !== '');
        let currentMax = activeClass.students.length > 0 ? Math.max(...activeClass.students.map(s=>s.number)) : 0;
        
        const newStudents = lines.map((line, idx) => {
          const cols = line.split(/[\t,]/).map(c => c.trim().replace(/^"|"$/g, ''));
          let num = currentMax + 1, name = "", furigana = "", gender = "その他";
          
          if(cols.length > 0) {
            if(!isNaN(parseInt(cols[0]))) { 
              num = parseInt(cols[0]); 
              name = cols[1] || ""; 
              furigana = cols[2] || "";
              gender = cols[3] || "その他";
            } else { 
              name = cols[0]; 
              furigana = cols[1] || "";
              gender = cols[2] || "その他";
            }
          }
          if(!["男", "女", "その他"].includes(gender)) gender = "その他";
          currentMax = num;
          
          return { id: `s_bulk_${Date.now()}_${idx}`, number: num, name, furigana, gender, status: "在籍" };
        });

        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: [...c.students, ...newStudents]
          } : c)
        });
        showToast(`${newStudents.length}名の生徒を追加しました。`, "success");
        setBulkImport({ show: false, text: '' });
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="font-bold text-slate-700 mb-4 border-b pb-2">クラス構成設定</h2>
            <div className="flex flex-wrap gap-6 items-center justify-center mb-4">
              {[1, 2, 3].map(g => (
                <div key={g} className="flex items-center gap-2">
                  <span className="text-sm font-bold">{g}年生</span>
                  <select value={gradesConfig[g]} onChange={e => setGradesConfig({...gradesConfig, [g]: Number(e.target.value)})} className="border rounded p-1.5 text-sm">
                    {[...Array(11).keys()].map(n => <option key={n} value={n}>{n}クラス</option>)}
                  </select>
                </div>
              ))}
              <button onClick={applyConfig} className="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded text-sm font-bold">適用</button>
            </div>
          </div>

          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <div className="flex flex-col sm:flex-row justify-between items-center mb-4 border-b pb-3 gap-3">
              <ClassSelector classes={appData.classes} activeClassId={activeClassId} setActiveClassId={setActiveClassId} />
              
              <div className="flex gap-2 w-full sm:w-auto justify-end">
                <button onClick={() => setBulkImport({ show: true, text: '' })} className="bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100 px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1 shadow-sm"><i className="fa-solid fa-file-import"></i> 一括追加</button>
                <button onClick={addStudent} className="bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1 shadow-sm"><i className="fa-solid fa-plus"></i> 1名追加</button>
              </div>
            </div>

            {activeClass && (
              <div className="overflow-x-auto border rounded">
                <table className="w-full text-sm whitespace-nowrap">
                  <thead className="bg-slate-100 text-slate-600">
                    <tr>
                      <th className="p-2 w-16 text-center">番号</th>
                      <th className="p-2 text-center">名前</th>
                      <th className="p-2 text-center">ふりがな</th>
                      <th className="p-2 w-20 text-center">性別</th>
                      <th className="p-2 w-24 text-center">状態</th>
                      <th className="p-2 w-16 text-center">削除</th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeClass.students.map(s => (
                      <tr key={s.id} className="border-b hover:bg-slate-50">
                        <td className="p-1"><input type="number" value={s.number} onChange={e => handleStudentChange(s.id, 'number', Number(e.target.value))} className="w-full text-center border rounded p-1" /></td>
                        <td className="p-1"><input type="text" value={s.name} onChange={e => handleStudentChange(s.id, 'name', e.target.value)} className={`w-full border rounded p-1 ${s.status!=='在籍'?'text-slate-400':''}`} /></td>
                        <td className="p-1"><input type="text" value={s.furigana || ""} onChange={e => handleStudentChange(s.id, 'furigana', e.target.value)} className={`w-full border rounded p-1 ${s.status!=='在籍'?'text-slate-400':''}`} /></td>
                        <td className="p-1">
                          <select value={s.gender || "その他"} onChange={e => handleStudentChange(s.id, 'gender', e.target.value)} className="w-full border rounded p-1 font-bold text-center">
                            <option value="男">男</option><option value="女">女</option><option value="その他">その他</option>
                          </select>
                        </td>
                        <td className="p-1">
                          <select value={s.status} onChange={e => handleStudentChange(s.id, 'status', e.target.value)} className="w-full border rounded p-1 font-bold text-center">
                            <option value="在籍">在籍</option><option value="転出">転出</option><option value="休学">休学</option>
                          </select>
                        </td>
                        <td className="p-1 text-center">
                          <button onClick={() => removeStudent(s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded transition-colors" title="削除">
                            <i className="fa-solid fa-trash"></i>
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {bulkImport.show && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-800 text-white px-4 py-3 font-bold flex justify-between items-center">
                  <span><i className="fa-solid fa-file-import mr-2"></i>名簿データ一括追加</span>
                  <button onClick={() => setBulkImport({ show: false, text: '' })} className="text-white hover:text-gray-300">
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-4 overflow-y-auto">
                  <p className="text-xs text-slate-500 mb-2">Excel等から「出席番号」「氏名」「ふりがな」「性別」の列をコピーして貼り付けてください。</p>
                  <textarea value={bulkImport.text} onChange={e => setBulkImport({...bulkImport, text: e.target.value})} className="w-full h-48 border rounded p-2 text-sm font-mono" placeholder="1 山田太郎 やまだたろう 男&#10;2 佐藤花子 さとうはなこ 女"></textarea>
                </div>
                <div className="bg-slate-50 px-4 py-3 flex justify-end gap-2 border-t">
                  <button onClick={() => setBulkImport({ show: false, text: '' })} className="px-4 py-2 border rounded bg-white text-sm font-bold">キャンセル</button>
                  <button onClick={processBulkImport} className="px-4 py-2 rounded bg-indigo-600 text-white text-sm font-bold">追加する</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. システム設定画面 (SystemSettingsScreen)
    // ==========================================
    function SystemSettingsScreen({ appData, setAppData, showToast, syncId, setSyncId, isLinkedDevice, lastCloudUpdateTime }) {
      const safeSettings = appData.settings || {};
      const [apiInput, setApiInput] = useState(safeSettings.geminiApiKey || "");
      const [attSyncInput, setAttSyncInput] = useState(safeSettings.attendanceSyncCode || "");
      const [linkInput, setLinkInput] = useState("");

      const saveApiSettings = () => {
        setAppData({ ...appData, settings: { ...(appData.settings || {}), geminiApiKey: apiInput.trim(), attendanceSyncCode: attSyncInput.trim() } });
        showToast("設定を保存しました。", "success");
      };

      const handleLink = () => {
        if (!/^\d{8}$/.test(linkInput)) return showToast("正しい8桁のコードを入力してください", "error");
        if (window.confirm(`この端末のデータは失われ、コード ${linkInput} のデータで上書きされます。よろしいですか？`)) {
          safeStorage.set('ai_review_sync_id', linkInput);
          setSyncId(linkInput);
          isLinkedDevice.current = true;
          lastCloudUpdateTime.current = 0;
          showToast("同期コードをリンクしました。", "success");
        }
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="font-bold text-slate-700 mb-4 border-b pb-2 flex items-center gap-2"><i className="fa-solid fa-key text-amber-500"></i> API・連携設定</h2>
            
            <div className="mb-4">
              <label className="block text-sm font-bold text-slate-600 mb-1">Gemini API キー</label>
              <input type="password" value={apiInput} onChange={e => setApiInput(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-amber-500 font-mono" placeholder="AIzaSy..." />
              <p className="text-xs text-slate-400 mt-1">※AI評価を実行するために必要です。端末内にのみ保存されます。</p>
            </div>

            <div className="mb-4">
              <label className="block text-sm font-bold text-slate-600 mb-1">授業出欠記録システムの同期コード</label>
              <input type="text" value={attSyncInput} onChange={e => setAttSyncInput(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-amber-500 font-mono tracking-widest" placeholder="8桁の数字" />
              <p className="text-xs text-slate-400 mt-1">※設定すると、授業別評価画面で出欠データを一括取得できます。</p>
            </div>

            <button onClick={saveApiSettings} className="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded font-bold shadow-sm flex items-center gap-2"><i className="fa-solid fa-save"></i> 設定を保存</button>
          </div>

          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="font-bold text-slate-700 mb-4 border-b pb-2 flex items-center gap-2"><i className="fa-solid fa-cloud text-blue-500"></i> データ同期 (AI-Review-Collector)</h2>
            <div className="flex items-center gap-3 mb-4 bg-blue-50 p-4 rounded border border-blue-100">
              <span className="text-sm font-bold text-blue-800">あなたの同期コード:</span>
              <span className="text-2xl font-bold tracking-widest text-blue-600 bg-white px-4 py-1.5 rounded shadow-sm border border-blue-200 select-all">{syncId}</span>
            </div>

            <div className="pt-2">
              <label className="block text-sm font-bold text-slate-600 mb-1">他の端末のデータとリンクする（上書きされます）</label>
              <div className="flex gap-2">
                <input type="text" value={linkInput} onChange={e => setLinkInput(e.target.value)} placeholder="8桁のコード" className="border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 tracking-widest w-48" />
                <button onClick={handleLink} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold whitespace-nowrap flex items-center gap-2"><i className="fa-solid fa-link"></i> リンクする</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
