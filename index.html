<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Review-Collector</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (BIZ UDPGothic - ユニバーサルデザインフォント) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"BIZ UDPGothic"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

  <!-- Firebase (Compat版) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  <style>
    @media print {
      /* ★ 印刷をA4縦に指定 */
      @page { size: A4 portrait; margin: 10mm; }
      body { background: white; }
      .print-hidden { display: none !important; }
      .print-expand { width: 100% !important; max-height: none !important; overflow: visible !important; border: none !important; box-shadow: none !important; }
      table { width: 100% !important; border-collapse: collapse; }
    }
    input, select, textarea, button { font-family: inherit; }
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* 進捗ゲージ用のアニメーション */
    @keyframes progress-bar {
      0% { width: 0%; }
      30% { width: 50%; }
      70% { width: 80%; }
      90% { width: 90%; }
      100% { width: 95%; } 
    }
    .animate-progress-bar {
      animation: progress-bar 25s cubic-bezier(0.1, 0, 0.2, 1) forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'BIZ UDPGothic', sans-serif; color: #4b5563;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem; color: #1e40af;"></i>
      <h2 style="font-weight: bold; margin-bottom: 0.5rem;">AI-Review-Collectorを読み込んでいます...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // エラーバウンダリ
    // ==========================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        console.error("エラーを捕捉しました:", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 max-w-2xl mx-auto mt-10 bg-white border-t-4 border-red-500 rounded shadow">
              <h2 className="text-xl font-bold text-red-600 mb-4"><i className="fa-solid fa-triangle-exclamation"></i> 予期せぬエラーが発生しました</h2>
              <p className="text-sm text-slate-700 mb-4">
                端末内に保存されている古いデータと、新しいシステムの間に互換性の問題が発生している可能性があります。
              </p>
              <div className="bg-slate-100 p-4 rounded text-xs font-mono text-red-800 mb-6 overflow-auto">
                {this.state.error && this.state.error.toString()}
              </div>
              <button 
                onClick={() => {
                  if (window.confirm("端末内のデータを初期化して再読み込みします。よろしいですか？")) {
                    localStorage.removeItem('ai_review_app_data');
                    localStorage.removeItem('ai_review_sync_id'); 
                    window.location.reload();
                  }
                }}
                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold flex items-center gap-2"
              >
                <i className="fa-solid fa-trash-can"></i> データを初期化して復旧する
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ==========================================
    // ユーティリティ・定数
    // ==========================================
    const safeStorage = {
      get: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
      set: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } }
    };

    const getLocalDateString = () => {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const DEFAULT_RUBRIC = {
      knowledge: "・授業内容や専門用語を正しく記述しているか。\n\n【判定条件】\n・C評価：関係ない記述。\n・B評価：基本レベルの要約ができている。\n・A評価：非常に充実している。",
      thinking: "・自分の生活や社会課題と結びつけて考察しているか。\n\n【判定条件】\n・C評価：考察がない。\n・B評価：少し触れている。\n・A評価：深く考察できている。",
      attitude: "・新たな疑問や課題、次に向けて工夫したいことなどを見出しているか。\n\n【判定条件】\n・C評価：見出していない。\n・B評価：少し書かれている。\n・A評価：具体的に見出している。"
    };

    const DEFAULT_DATA = {
      settings: { grades: { 1: 1, 2: 0, 3: 0 }, geminiApiKey: "", attendanceSyncCode: "" },
      classes: [
        { 
          classId: "1-1", className: "1年1組",
          students: [
            { id: "s1", number: 1, name: "山田 太郎", furigana: "やまだ たろう", gender: "男", status: "在籍" },
            { id: "s2", number: 2, name: "佐藤 花子", furigana: "さとう はなこ", gender: "女", status: "在籍" },
            { id: "s3", number: 3, name: "鈴木 一郎", furigana: "すずき いちろう", gender: "男", status: "在籍" }
          ] 
        }
      ],
      rubrics: { "1": DEFAULT_RUBRIC, "2": DEFAULT_RUBRIC, "3": DEFAULT_RUBRIC },
      lessons: [], 
      reviews: {}  
    };

    const sanitizeAppData = (parsed) => {
      if (!parsed || typeof parsed !== 'object') return DEFAULT_DATA;
      return {
        settings: {
          grades: parsed.settings?.grades || { 1: 1, 2: 0, 3: 0 },
          geminiApiKey: parsed.settings?.geminiApiKey || "",
          attendanceSyncCode: parsed.settings?.attendanceSyncCode || ""
        },
        classes: Array.isArray(parsed.classes) && parsed.classes.length > 0 
          ? parsed.classes.map(c => ({
              classId: c.classId || "",
              className: c.className || "",
              students: Array.isArray(c.students) ? c.students.map(s => ({
                ...s,
                furigana: s.furigana || "",
                gender: s.gender || "その他",
              })) : []
            }))
          : DEFAULT_DATA.classes,
        rubrics: (() => {
          const r = parsed.rubrics || {};
          const result = { "1": DEFAULT_RUBRIC, "2": DEFAULT_RUBRIC, "3": DEFAULT_RUBRIC };
          for (let g of ["1", "2", "3"]) {
            if (r[g]) {
              if (typeof r[g] === 'string') {
                result[g] = DEFAULT_RUBRIC;
              } else if (typeof r[g] === 'object' && r[g].knowledge) {
                result[g] = r[g];
              }
            }
          }
          return result;
        })(),
        lessons: Array.isArray(parsed.lessons) ? parsed.lessons : [],
        reviews: (() => {
          const revs = parsed.reviews || {};
          const newRevs = {};
          for (let key in revs) {
            let rev = revs[key];
            let newAiEval = { k: "", t: "", a: "" };
            let newManualEval = { k: "", t: "", a: "" };
            
            if (rev.aiEval && typeof rev.aiEval === 'string') {
               newAiEval = { k: rev.aiEval, t: rev.aiEval, a: rev.aiEval };
            } else if (rev.aiEval && typeof rev.aiEval === 'object') {
               newAiEval = { k: rev.aiEval.k || "", t: rev.aiEval.t || "", a: rev.aiEval.a || "" };
            }

            if (rev.manualEval && typeof rev.manualEval === 'string') {
               newManualEval = { k: rev.manualEval, t: rev.manualEval, a: rev.manualEval };
            } else if (rev.manualEval && typeof rev.manualEval === 'object') {
               newManualEval = { k: rev.manualEval.k || "", t: rev.manualEval.t || "", a: rev.manualEval.a || "" };
            }

            newRevs[key] = {
              ...rev,
              aiEval: newAiEval,
              manualEval: newManualEval
            };
          }
          return newRevs;
        })()
      };
    };

    // ==========================================
    // Firebase Setup
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCMssHig9YsBwXue4ujMTvpSwLtf1u92mY",
      authDomain: "class-attendance-record.firebaseapp.com",
      databaseURL: "https://class-attendance-record-default-rtdb.firebaseio.com",
      projectId: "class-attendance-record",
      storageBucket: "class-attendance-record.firebasestorage.app",
      messagingSenderId: "829706690099",
      appId: "1:829706690099:web:63c41a0313ef7717798d46"
    };

    let app, auth, db;
    if (firebaseConfig.apiKey) {
      try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch (e) { console.error("Firebase Init Error:", e); }
    }

    // ==========================================
    // Gemini API Call
    // ==========================================
    const callGeminiAPI = async (apiKey, rubric, targetData) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `以下の生徒の振り返りテキストを、3つの評価基準「知識・技能（k）」「思考・判断・表現（t）」「主体的に学習に取り組む態度（a）」それぞれについて、「A」「B」「C」の3段階で評価してください。
また、全体としての評価理由を簡潔（50文字以内）に記述してください。

【評価基準】
■ 知識・技能（k）
${rubric.knowledge}

■ 思考・判断・表現（t）
${rubric.thinking}

■ 主体的に学習に取り組む態度（a）
${rubric.attitude}

【生徒のテキスト（JSON形式）】
${JSON.stringify(targetData)}

【出力形式の厳守事項】
必ず以下のJSONスキーマに従うこと。マークダウン（\`\`\`json 等）を含めず、純粋なJSON配列のみを出力すること。
[
  {
    "studentId": "生徒のID",
    "aiEval": {
      "k": "A または B または C",
      "t": "A または B または C",
      "a": "A または B または C"
    },
    "aiReason": "評価の理由"
  }
]`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { response_mime_type: "application/json" }
        })
      });
      
      // ★ 429エラー等のハンドリング
      if (!response.ok) {
        const err = await response.text();
        if (response.status === 429) {
          throw new Error("AIの無料通信枠（1分間のリクエスト制限）を超過しました。約1分間待機してから、再度実行してください。");
        }
        throw new Error(`API Error: ${response.status} - ${err.substring(0, 50)}...`);
      }
      const data = await response.json();
      const textResponse = data.candidates[0].content.parts[0].text;
      return JSON.parse(textResponse);
    };

    const callGeminiOverallAnalysisAPI = async (apiKey, targetData) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `あなたは中学校のベテラン教員です。以下の生徒たちの「授業の振り返り」を分析し、クラス全体の傾向をまとめてください。

【生徒の振り返りテキスト（抜粋）】
${JSON.stringify(targetData, null, 2)}

【出力形式の厳守事項】
・挨拶や前置き（「はい、承知しました」等）は一切書かないでください。分析結果のみを直接出力してください。
・マークダウン記号（** や # など）は一切使用しないでください。
・以下のフォーマットに必ず従い、指定された項目を出力してください。

■ 全体評価
学習内容理解度：★（1〜5の星マークで5段階評価。例: ★★★☆☆）
授業への意欲：★（1〜5の星マークで5段階評価。例: ★★★★☆）

■ 評価の理由（2〜3文程度）
（理解度と意欲に関するクラス全体の傾向を簡潔に記述してください）

■ 次回への課題・疑問点
・（生徒のテキストから抽出した共通のつまずきや課題を1点目）
・（生徒のテキストから抽出した共通のつまずきや課題を2点目）`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });
      
      if (!response.ok) {
        const err = await response.text();
        if (response.status === 429) {
          throw new Error("AIの無料通信枠を超過しました。約1分間待機してから、再度実行してください。");
        }
        throw new Error(`API Error: ${response.status} - ${err.substring(0, 50)}...`);
      }
      const data = await response.json();
      return data.candidates[0].content.parts[0].text;
    };


    // ==========================================
    // 共通UIコンポーネント: クラス選択 (ボタン形式)
    // ==========================================
    function ClassSelector({ classes, activeClassId, setActiveClassId }) {
      const [activeGradeTab, setActiveGradeTab] = useState(activeClassId ? activeClassId.split('-')[0] : "1");

      useEffect(() => {
        if (activeClassId) {
          setActiveGradeTab(activeClassId.split('-')[0]);
        }
      }, [activeClassId]);

      return (
        <div className="flex items-center gap-2 flex-wrap pb-1">
          <div className="flex gap-1 flex-wrap">
            {[1, 2, 3].map(g => {
              const hasClasses = classes.some(c => c.classId.startsWith(`${g}-`));
              if (!hasClasses) return null;
              return (
                <button
                  key={`grade-${g}`}
                  onClick={() => {
                    setActiveGradeTab(g.toString());
                    const firstClass = classes.find(c => c.classId.startsWith(`${g}-`));
                    if (firstClass) setActiveClassId(firstClass.classId);
                  }}
                  className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                    activeGradeTab === g.toString()
                      ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                      : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'
                  }`}
                >
                  {g}年
                </button>
              );
            })}
          </div>

          <i className="fa-solid fa-angle-right text-slate-300 text-sm mx-1 hidden sm:block"></i>

          <div className="flex gap-1 flex-wrap">
            {classes.filter(c => c.classId.startsWith(`${activeGradeTab}-`)).map(c => (
              <button
                key={c.classId}
                onClick={() => setActiveClassId(c.classId)}
                className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                  activeClassId === c.classId
                    ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                    : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'
                }`}
              >
                {c.className.replace(`${activeGradeTab}年`, '')}
              </button>
            ))}
          </div>
        </div>
      );
    }


    // ==========================================
    // メインコンポーネント (App)
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('evaluation');
      const [appData, setAppData] = useState(DEFAULT_DATA);
      const [isLoaded, setIsLoaded] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [user, setUser] = useState(null);

      // Firebase Sync State
      const [syncId, setSyncId] = useState(() => {
        let id = safeStorage.get('ai_review_sync_id');
        if (!id) {
          id = Math.floor(10000000 + Math.random() * 90000000).toString();
          safeStorage.set('ai_review_sync_id', id);
        }
        return id;
      });
      const lastCloudUpdateTime = useRef(0);
      const isIncomingUpdate = useRef(false);
      const isLinkedDevice = useRef(false);
      const [isSyncing, setIsSyncing] = useState(false);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      const saveToFirebase = async (dataToSave) => {
        if (!db || !user) return;
        setIsSyncing(true);
        const now = new Date().toISOString();
        lastCloudUpdateTime.current = new Date(now).getTime();
        try {
          await db.collection('ai_review_sync').doc(syncId).set({ 
            data: JSON.stringify(dataToSave), updatedAt: now 
          });
        } catch (e) { console.error("Firebase Sync Error:", e); } 
        finally { setTimeout(() => setIsSyncing(false), 1000); }
      };

      // 初期ロード
      useEffect(() => {
        const saved = safeStorage.get('ai_review_app_data');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setAppData(sanitizeAppData(parsed));
          } catch(e){
              console.error("データのパースに失敗しました", e);
              setAppData(DEFAULT_DATA);
          }
        }
        setIsLoaded(true);
      }, []);

      // Firebase Listen
      useEffect(() => {
        if (!db || !user || !isLoaded) return;
        const unsubscribe = db.collection('ai_review_sync').doc(syncId).onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            const cloudTime = data.updatedAt ? new Date(data.updatedAt).getTime() : 0;
            if (cloudTime > lastCloudUpdateTime.current) {
              lastCloudUpdateTime.current = cloudTime;
              isIncomingUpdate.current = true;
              
              try {
                const parsed = JSON.parse(data.data);
                setAppData(sanitizeAppData(parsed));
              } catch(e) {
                console.error("Firebaseデータのパースに失敗しました", e);
              }
            }
          } else if (!isLinkedDevice.current) {
             saveToFirebase(appData);
          }
        });
        return () => unsubscribe();
      }, [db, user, syncId, isLoaded]);

      // データ変更時
      useEffect(() => {
        if (isLoaded) {
          safeStorage.set('ai_review_app_data', JSON.stringify(appData));
          if (isIncomingUpdate.current) isIncomingUpdate.current = false;
          else saveToFirebase(appData);
        }
      }, [appData, isLoaded]);

      // Auth
      useEffect(() => {
        if (!auth) return;
        auth.signInAnonymously().catch(e => console.error(e));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      if (!isLoaded) return null;

      return (
        <div>
          <header className="bg-slate-800 text-white shadow-md print-hidden sticky top-0 z-50">
            <div className="container mx-auto px-4 py-2 flex flex-wrap justify-between items-center">
              <h1 className="text-xl font-bold flex items-center gap-2 tracking-wide">
                <i className="fa-solid fa-robot text-blue-400"></i>
                AI-Review-Collector
              </h1>
              <div className="flex gap-2 mt-2 sm:mt-0 items-center overflow-x-auto pb-1 sm:pb-0">
                {isSyncing && (
                  <div className="flex items-center text-xs text-slate-300 font-bold mr-2 animate-pulse whitespace-nowrap">
                    <i className="fa-solid fa-cloud-upload-alt mr-1"></i>同期中
                  </div>
                )}
                <NavButton active={activeTab === 'evaluation'} onClick={() => setActiveTab('evaluation')} icon="fa-solid fa-clipboard-check" label="授業別評価" />
                <NavButton active={activeTab === 'cumulative'} onClick={() => setActiveTab('cumulative')} icon="fa-solid fa-table" label="累積評価" />
                <NavButton active={activeTab === 'students'} onClick={() => setActiveTab('students')} icon="fa-solid fa-users" label="生徒設定" />
                <NavButton active={activeTab === 'rubric'} onClick={() => setActiveTab('rubric')} icon="fa-solid fa-scale-balanced" label="評価基準" />
                <NavButton active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon="fa-solid fa-cog" label="システム設定" />
              </div>
            </div>
          </header>

          {toast.show && (
            <div className={`fixed top-16 right-4 z-50 px-4 py-3 rounded shadow-lg flex items-center gap-2 transition-opacity font-bold ${
              toast.type === 'error' ? 'bg-red-500 text-white' : toast.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white'
            }`}>
              {toast.type === 'error' ? <i className="fa-solid fa-triangle-exclamation"></i> : <i className="fa-solid fa-check-circle"></i>}
              {toast.message}
            </div>
          )}

          <main className="container mx-auto px-2 py-4 sm:px-4">
            {activeTab === 'evaluation' && <EvaluationScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'cumulative' && <CumulativeScreen appData={appData} />}
            {activeTab === 'students' && <StudentSettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'rubric' && <RubricSettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'settings' && <SystemSettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} syncId={syncId} setSyncId={setSyncId} isLinkedDevice={isLinkedDevice} lastCloudUpdateTime={lastCloudUpdateTime} />}
          </main>
        </div>
      );
    }

    function NavButton({ active, onClick, icon, label }) {
      return (
        <button
          onClick={onClick}
          className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-sm font-bold transition-colors whitespace-nowrap ${
            active ? 'bg-white text-slate-800 shadow' : 'text-slate-300 hover:bg-slate-700 hover:text-white'
          }`}
        >
          <i className={icon}></i>
          <span className="hidden sm:inline">{label}</span>
        </button>
      );
    }

    // ==========================================
    // 1. 授業別評価画面 (EvaluationScreen)
    // ==========================================
    function EvaluationScreen({ appData, setAppData, showToast }) {
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || "");
      const [activeLessonId, setActiveLessonId] = useState("");
      const [pasteText, setPasteText] = useState("");
      const [isPasteMode, setIsPasteMode] = useState(false);
      const [isEvaluating, setIsEvaluating] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);

      const activeClass = appData.classes.find(c => c.classId === activeClassId);
      const classLessons = (appData.lessons || []).filter(l => l.classId === activeClassId).sort((a,b)=>a.count - b.count);
      const activeLesson = classLessons.find(l => l.id === activeLessonId) || classLessons[0];

      useEffect(() => {
        if (classLessons.length > 0 && !classLessons.find(l => l.id === activeLessonId)) {
          setActiveLessonId(classLessons[0].id);
        }
      }, [activeClassId, classLessons]);

      const addLesson = () => {
        if (!activeClassId) return;
        const nextCount = classLessons.length > 0 ? Math.max(...classLessons.map(l=>l.count)) + 1 : 1;
        const newLesson = {
          id: `l_${Date.now()}`, classId: activeClassId, count: nextCount, title: `第${nextCount}回 実習`, date: getLocalDateString(), overallAnalysis: ""
        };
        setAppData({ ...appData, lessons: [...appData.lessons, newLesson] });
        setActiveLessonId(newLesson.id);
      };

      const deleteLesson = () => {
        if (!activeLesson) return;
        if (!window.confirm(`「${activeLesson.title}」を削除しますか？\n※この授業の振り返りデータも全て削除されます。`)) return;

        const newLessons = appData.lessons.filter(l => l.id !== activeLesson.id);
        const newReviews = { ...(appData.reviews || {}) };
        
        Object.keys(newReviews).forEach(key => {
          if (key.startsWith(`${activeLesson.id}_`)) {
            delete newReviews[key];
          }
        });

        setAppData(prev => ({ ...prev, lessons: newLessons, reviews: newReviews }));
        
        const remainingLessons = newLessons.filter(l => l.classId === activeClassId);
        setActiveLessonId(remainingLessons.length > 0 ? remainingLessons[0].id : "");
        showToast("授業を削除しました。", "success");
      };

      const updateLesson = (id, field, value) => {
        setAppData({ ...appData, lessons: appData.lessons.map(l => l.id === id ? { ...l, [field]: value } : l) });
      };

      const getReview = (studentId) => {
        if(!activeLesson) return { attendance: "未", text: "", aiEval: {k:"", t:"", a:""}, aiReason: "", manualEval: {k:"", t:"", a:""} };
        const reviews = appData.reviews || {};
        return reviews[`${activeLesson.id}_${studentId}`] || { attendance: "未", text: "", aiEval: {k:"", t:"", a:""}, aiReason: "", manualEval: {k:"", t:"", a:""} };
      };

      const updateReview = (studentId, updates) => {
        if(!activeLesson) return;
        const key = `${activeLesson.id}_${studentId}`;
        const current = getReview(studentId);
        setAppData(prev => ({
          ...prev, 
          reviews: { ...(prev.reviews || {}), [key]: { ...current, ...updates } }
        }));
      };

      const syncAttendanceFromCloud = async () => {
        const code = appData.settings.attendanceSyncCode;
        if (!code) return showToast("設定画面で「授業出欠記録システム」の同期コードを入力してください。", "error");
        if (!activeLesson) return;

        showToast("出欠データを取得中...", "info");
        try {
          const doc = await db.collection('attendance_sync').doc(code).get();
          if (doc.exists) {
            const attData = JSON.parse(doc.data().data);
            const targetLessons = attData.lessons.filter(l => l.date === activeLesson.date && l.classId === activeClassId);
            
            if (targetLessons.length === 0) {
              return showToast(`${activeLesson.date} の出欠データが見つかりませんでした。`, "error");
            }
            const attLessonId = targetLessons[0].id;
            let syncCount = 0;

            const newReviews = { ...(appData.reviews || {}) };
            activeClass.students.forEach(s => {
              const attClass = attData.classes.find(c => c.classId === activeClassId);
              if (attClass) {
                const attStudent = attClass.students.find(st => 
                  st.number === s.number || 
                  st.name.replace(/\s+/g, '') === s.name.replace(/\s+/g, '')
                );
                
                if (attStudent) {
                  const attRecord = attData.attendances[`${attLessonId}_${attStudent.id}`];
                  
                  let status = "出席";
                  if (attRecord) {
                    if (typeof attRecord === 'string') {
                      status = attRecord.split('\n')[0].trim();
                    } else if (attRecord.status) {
                      status = attRecord.status;
                    }
                  }
                  
                  if (status.includes("保健室")) status = "保健室";
                  else if (status.includes("その他") || status.includes("見学") || status.includes("他")) status = "他";
                  else if (!["出席", "欠席", "遅刻", "早退", "保健室", "他"].includes(status)) status = "出席";
                  
                  const key = `${activeLesson.id}_${s.id}`;
                  const current = newReviews[key] || { attendance: "未", text: "", aiEval: {k:"", t:"", a:""}, aiReason: "", manualEval: {k:"", t:"", a:""} };
                  newReviews[key] = { ...current, attendance: status };
                  syncCount++;
                }
              }
            });
            setAppData(prev => ({ ...prev, reviews: newReviews }));
            showToast(`${syncCount}名の出欠状況を反映しました。`, "success");
          } else {
            showToast("同期コードが無効、またはデータが存在しません。", "error");
          }
        } catch (e) {
          console.error(e);
          showToast("出欠データの取得に失敗しました。", "error");
        }
      };

      const handlePasteButtonClick = () => {
        const hasUnsetAttendance = activeClass.students.some(s => {
          const rev = getReview(s.id);
          return rev.attendance === "未" && s.status === "在籍";
        });
        
        if (hasUnsetAttendance) {
          if (!window.confirm("⚠️ 出欠情報が未反映の生徒がいます。\n欠席者が自動スキップされないため、コメントの貼り付け行がズレて他の生徒に登録される原因となります。\n\n先に「出欠反映」を行うことを強く推奨します。\n\nこのまま貼り付け画面に進みますか？")) {
            return; 
          }
        }
        setIsPasteMode(true);
      };

      const handleApplyPaste = () => {
        if (!activeLesson || !pasteText) return;
        
        let lines = pasteText.split('\n').map(l => l.trim());
        while (lines.length > 0 && lines[lines.length - 1] === "") {
          lines.pop();
        }
        
        const activeStudents = activeClass.students.filter(s => s.status === "在籍" || s.status === "休学").filter(s => {
          const rev = getReview(s.id);
          return rev.attendance !== "欠席" && rev.attendance !== "転出";
        });

        if (lines.length !== activeStudents.length) {
          if (!window.confirm(`コピーされた行数(${lines.length})と対象生徒数(${activeStudents.length})が一致しません。\n上から順に強制的に反映しますか？`)) return;
        }

        const newReviews = { ...(appData.reviews || {}) };
        activeStudents.forEach((s, index) => {
          if (lines[index] !== undefined) {
            const key = `${activeLesson.id}_${s.id}`;
            const current = newReviews[key] || { attendance: "未", aiEval: {k:"", t:"", a:""}, aiReason: "", manualEval: {k:"", t:"", a:""} };
            newReviews[key] = { ...current, text: lines[index] };
          }
        });
        setAppData(prev => ({ ...prev, reviews: newReviews }));
        setPasteText("");
        setIsPasteMode(false);
        showToast("テキストを反映しました。", "success");
      };

      const runAIEvaluation = async () => {
        if (!appData.settings.geminiApiKey) return showToast("設定画面からGemini APIキーを登録してください。", "error");
        if (!activeLesson) return;

        const grade = activeClassId.split('-')[0];
        const rubrics = appData.rubrics || {};
        const rubric = rubrics[grade] || DEFAULT_RUBRIC;

        let targetStudents = activeClass.students.filter(s => {
          const rev = getReview(s.id);
          const notEvaluated = !rev.aiEval || !rev.aiEval.k || !rev.aiEval.t || !rev.aiEval.a;
          return rev.text && notEvaluated && rev.attendance !== "欠席";
        });

        if (targetStudents.length === 0) {
          const allStudentsWithText = activeClass.students.filter(s => {
            const rev = getReview(s.id);
            return rev.text && rev.attendance !== "欠席";
          });
          
          if (allStudentsWithText.length === 0) {
            return showToast("評価する振り返りテキストがありません。", "info");
          }
          
          if (window.confirm("未評価のテキストがありません。入力済みのすべてのテキストを再評価しますか？")) {
            targetStudents = allStudentsWithText;
          } else {
            return;
          }
        }

        setIsEvaluating(true);
        try {
          const targetData = targetStudents.map(s => ({
            studentId: s.id,
            text: getReview(s.id).text
          }));

          const results = await callGeminiAPI(appData.settings.geminiApiKey, rubric, targetData);
          
          const newReviews = { ...(appData.reviews || {}) };
          let successCount = 0;
          results.forEach(res => {
            if (res.studentId && res.aiEval && res.aiEval.k && res.aiEval.t && res.aiEval.a) {
              const key = `${activeLesson.id}_${res.studentId}`;
              if (newReviews[key]) {
                newReviews[key].aiEval = {
                  k: res.aiEval.k,
                  t: res.aiEval.t,
                  a: res.aiEval.a
                };
                newReviews[key].aiReason = res.aiReason || "";
                successCount++;
              }
            }
          });
          setAppData(prev => ({ ...prev, reviews: newReviews }));
          showToast(`${successCount}名のAI評価が完了しました。`, "success");
        } catch (e) {
          console.error(e);
          showToast(e.message, "error");
        } finally {
          setIsEvaluating(false);
        }
      };

      const runOverallAnalysis = async () => {
        if (!appData.settings.geminiApiKey) return showToast("設定画面からGemini APIキーを登録してください。", "error");
        if (!activeLesson) return;

        const targetStudents = activeClass.students.filter(s => {
          const rev = getReview(s.id);
          return rev.text && rev.attendance !== "欠席";
        });

        if (targetStudents.length === 0) return showToast("分析する振り返りテキストがありません。", "info");

        setIsAnalyzing(true);
        try {
          const targetData = targetStudents.map(s => ({
            text: getReview(s.id).text
          }));

          const resultText = await callGeminiOverallAnalysisAPI(appData.settings.geminiApiKey, targetData);
          const cleanText = resultText.replace(/\*\*/g, ''); 
          
          updateLesson(activeLesson.id, 'overallAnalysis', cleanText);
          showToast(`授業全体の分析が完了しました。`, "success");
        } catch (e) {
          console.error(e);
          showToast(e.message, "error");
        } finally {
          setIsAnalyzing(false);
        }
      };

      if (!activeClass) return <div className="text-center p-8 text-slate-500">クラスが設定されていません。</div>;

      const evalColor = (evalStr) => {
        if (evalStr === 'A') return "bg-blue-100 text-blue-800 border-blue-300";
        if (evalStr === 'B') return "bg-emerald-100 text-emerald-800 border-emerald-300";
        if (evalStr === 'C') return "bg-orange-100 text-orange-800 border-orange-300";
        return "bg-slate-100 text-slate-400 border-slate-200";
      };

      const attendanceSelectClass = (att) => {
        if (att === '欠席') return 'bg-red-50 text-red-800 border-red-200';
        if (att === '遅刻') return 'bg-yellow-50 text-yellow-800 border-yellow-200';
        if (att === '早退') return 'bg-orange-50 text-orange-800 border-orange-200';
        if (att === '保健室') return 'bg-green-50 text-green-800 border-green-200';
        if (att === 'その他') return 'bg-slate-100 text-slate-700 border-slate-300';
        if (att === '未') return 'bg-slate-50 text-slate-400 border-slate-200 font-normal';
        return 'bg-white text-slate-800 border-slate-300'; 
      };

      return (
        <div className="space-y-4">
          <div className="flex flex-col items-center mb-4 print:hidden">
            <h2 className="text-xl sm:text-2xl font-bold text-slate-700 text-center tracking-wider">{activeClass.className} 授業別評価</h2>
          </div>

          <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex flex-col gap-3">
            <div className="flex items-start sm:items-center gap-2">
              <span className="text-xs font-bold text-slate-500 mt-2 sm:mt-0 mr-1 w-14 text-right whitespace-nowrap shrink-0"><i className="fa-solid fa-users mr-1"></i>クラス:</span>
              <div className="flex-1">
                 <ClassSelector classes={appData.classes} activeClassId={activeClassId} setActiveClassId={setActiveClassId} />
              </div>
            </div>
            
            <div className="flex items-start sm:items-center gap-2 border-t border-slate-100 pt-3">
              <span className="text-xs font-bold text-slate-500 mt-2 sm:mt-0 mr-1 w-14 text-right whitespace-nowrap shrink-0"><i className="fa-solid fa-chalkboard-user mr-1"></i>授業:</span>
              <div className="flex-1 flex flex-wrap gap-2 items-center">
                {classLessons.length > 0 ? (
                  <div className="flex gap-1 flex-wrap">
                    {classLessons.map(l => (
                      <button
                        key={l.id}
                        onClick={() => setActiveLessonId(l.id)}
                        className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                          activeLessonId === l.id
                            ? 'bg-blue-600 text-white border-blue-600 shadow-sm'
                            : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'
                        }`}
                      >
                        {l.title}
                      </button>
                    ))}
                  </div>
                ) : (
                  <span className="text-sm text-slate-400 font-bold ml-1">授業なし</span>
                )}
                
                <div className="h-6 w-px bg-slate-200 hidden sm:block mx-1"></div>
                
                <button onClick={addLesson} className="text-sm bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded font-bold border border-slate-300 transition-colors shadow-sm">
                  <i className="fa-solid fa-plus"></i> 授業追加
                </button>
                {activeLesson && (
                  <button onClick={deleteLesson} className="text-sm bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded font-bold border border-red-200 transition-colors shadow-sm">
                    <i className="fa-solid fa-trash"></i> 削除
                  </button>
                )}
              </div>
            </div>
          </div>

          {activeLesson && (
            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
              <div className="flex flex-wrap gap-4 mb-4 items-end border-b border-slate-100 pb-4">
                <div className="flex-1 min-w-[200px]">
                  <label className="block text-xs font-bold text-slate-500 mb-1">授業タイトル</label>
                  <input type="text" value={activeLesson.title} onChange={e => updateLesson(activeLesson.id, 'title', e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm font-bold focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">実施日</label>
                  <input type="date" value={activeLesson.date} onChange={e => updateLesson(activeLesson.id, 'date', e.target.value)} className="border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" />
                </div>
                <div className="flex gap-2">
                  <button onClick={syncAttendanceFromCloud} className="bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 px-3 py-2 rounded text-sm font-bold transition-colors flex items-center gap-1.5 shadow-sm">
                    <i className="fa-solid fa-sync"></i> 出欠反映
                  </button>
                  <button onClick={handlePasteButtonClick} className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-3 py-2 rounded text-sm font-bold transition-colors flex items-center gap-1.5 shadow-sm">
                    <i className="fa-solid fa-paste"></i> 振り返りコメント貼り付け
                  </button>
                </div>
              </div>

              {/* 授業全体の分析とアドバイス パネル */}
              <div className="mb-6 bg-slate-50 border border-slate-200 rounded-lg p-4">
                <div className="flex flex-wrap justify-between items-center mb-2 gap-2">
                  <h3 className="font-bold text-slate-700 flex items-center gap-2">
                    <i className="fa-solid fa-chart-line text-blue-500"></i> 授業全体の分析とアドバイス
                  </h3>
                  <div className="flex items-center gap-3">
                    <span className="text-xs font-bold text-slate-500">
                      入力済み: {activeClass.students.filter(s => getReview(s.id).text).length} 名
                    </span>
                    {/* ★ 修正①: absolute を外し、ボタンとゲージの重なりを解消 */}
                    <div className="flex flex-col items-end w-40">
                      <button onClick={runOverallAnalysis} disabled={isAnalyzing} className="bg-white border border-blue-300 text-blue-700 hover:bg-blue-50 px-3 py-1.5 rounded text-xs font-bold transition-colors flex items-center gap-1.5 shadow-sm w-full justify-center">
                        {isAnalyzing ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-lightbulb text-amber-500"></i>}
                        {isAnalyzing ? "分析中..." : "クラス全体を分析"}
                      </button>
                      {isAnalyzing && (
                        <div className="w-full mt-1">
                          <div className="flex justify-between text-[9px] text-blue-600 font-bold mb-0.5 px-1">
                            <span>AI分析中(約20秒)...</span>
                          </div>
                          <div className="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden shadow-inner">
                            <div className="bg-blue-400 h-1.5 rounded-full animate-progress-bar"></div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
                {activeLesson.overallAnalysis ? (
                  <div className="text-sm text-slate-700 bg-white p-4 rounded border border-slate-200 whitespace-pre-wrap leading-relaxed shadow-inner font-mono">
                    {activeLesson.overallAnalysis}
                  </div>
                ) : (
                  <p className="text-xs text-slate-400">
                    ボタンを押すと、入力された振り返りテキストからクラスの理解度傾向や次回へのアドバイスをAIが分析します。
                  </p>
                )}
              </div>

              <div className="flex justify-between items-center mb-3">
                <h3 className="font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-list-check"></i> 個別評価リスト</h3>
                {/* ★ 修正①: absolute を外し、ボタンとゲージの重なりを解消 */}
                <div className="flex flex-col items-end w-32">
                  <button onClick={runAIEvaluation} disabled={isEvaluating} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-4 py-2 rounded text-sm font-bold transition-colors flex items-center gap-2 shadow-sm w-full justify-center">
                    {isEvaluating ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                    評価開始
                  </button>
                  {isEvaluating && (
                    <div className="w-full mt-1">
                      <div className="flex justify-between text-[9px] text-blue-600 font-bold mb-0.5 px-1">
                        <span>AIと通信中(数十秒)...</span>
                      </div>
                      <div className="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden shadow-inner">
                        <div className="bg-blue-500 h-1.5 rounded-full animate-progress-bar"></div>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              <div className="overflow-x-auto border border-slate-200 rounded-lg">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="bg-slate-100 text-slate-600 border-b border-slate-200">
                    <tr>
                      <th rowSpan={2} className="p-2 w-12 text-center border-r border-slate-200 align-middle text-sm font-bold">番号</th>
                      <th rowSpan={2} className="p-2 w-32 text-center border-r border-slate-200 align-middle text-sm font-bold">氏名</th>
                      <th rowSpan={2} className="p-2 w-12 text-center border-r border-slate-200 align-middle text-sm font-bold">性別</th>
                      <th rowSpan={2} className="p-2 w-20 text-center border-r border-slate-200 align-middle text-sm font-bold">出欠</th>
                      <th rowSpan={2} className="p-2 min-w-[200px] w-auto text-center border-r border-slate-200 align-middle text-sm font-bold">振り返りテキスト</th>
                      <th colSpan={3} className="p-1.5 text-center border-b border-r border-slate-200 text-sm font-bold">AI評価</th>
                      <th rowSpan={2} className="p-2 min-w-[120px] text-center border-r border-slate-200 align-middle text-sm font-bold">AIの理由</th>
                      <th colSpan={3} className="p-1.5 text-center border-b border-slate-200 text-sm font-bold">最終評価</th>
                    </tr>
                    <tr>
                      <th className="p-1 text-center text-xs w-10 border-r border-slate-200 bg-slate-50">知</th>
                      <th className="p-1 text-center text-xs w-10 border-r border-slate-200 bg-slate-50">思</th>
                      <th className="p-1 text-center text-xs w-10 border-r border-slate-200 bg-slate-50">主</th>
                      <th className="p-1 text-center text-xs w-10 border-r border-slate-200 bg-slate-50">知</th>
                      <th className="p-1 text-center text-xs w-10 border-r border-slate-200 bg-slate-50">思</th>
                      <th className="p-1 text-center text-xs w-10 bg-slate-50">主</th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeClass.students.map(s => {
                      const rev = getReview(s.id);
                      const isAbsent = rev.attendance === "欠席" || s.status !== "在籍";
                      return (
                        <tr key={s.id} className={`border-b border-slate-100 hover:bg-slate-50 ${isAbsent ? 'bg-slate-50 opacity-60' : ''}`}>
                          <td className="p-2 text-center text-slate-500 font-bold align-top bg-white">{s.number}</td>
                          <td className="p-2 text-left align-top bg-white">
                            <div className="flex flex-col">
                              <div className="flex items-center gap-1.5">
                                <span className="font-bold text-slate-700 text-base whitespace-nowrap">{s.name}</span>
                                {s.status !== "在籍" && <span className="text-[10px] bg-red-100 text-red-700 px-1 py-0.5 rounded font-bold border border-red-200 leading-none">{s.status}</span>}
                              </div>
                              <span className="text-xs text-slate-400 font-normal mt-0.5 whitespace-nowrap">{s.furigana}</span>
                            </div>
                          </td>
                          <td className="p-2 text-center text-slate-600 text-sm align-top bg-white">
                            {s.gender}
                          </td>
                          <td className="p-2 text-center align-top border-r border-slate-100 bg-white">
                            <select value={rev.attendance} onChange={e => updateReview(s.id, { attendance: e.target.value })} className={`border rounded px-1 py-1 text-xs font-bold outline-none cursor-pointer w-full text-center ${attendanceSelectClass(rev.attendance)}`}>
                              <option value="未">未</option>
                              <option value="出席">出席</option>
                              <option value="欠席">欠席</option>
                              <option value="遅刻">遅刻</option>
                              <option value="早退">早退</option>
                              <option value="保健室">保健室</option>
                              <option value="その他">他</option>
                            </select>
                          </td>
                          <td className="p-2 align-top border-r border-slate-100 bg-white">
                            <textarea 
                              value={rev.text} 
                              onChange={e => updateReview(s.id, { text: e.target.value })} 
                              disabled={isAbsent} 
                              rows={2}
                              className="w-full border border-slate-200 rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 disabled:bg-transparent disabled:border-transparent resize-y min-h-[44px] leading-relaxed" 
                              placeholder={isAbsent ? "-" : "テキストを入力..."} 
                            />
                          </td>
                          <td className="p-1 text-center align-middle border-r border-slate-100 bg-white">
                            <div className={`inline-flex items-center justify-center w-6 h-6 rounded border font-bold text-xs ${evalColor(rev.aiEval?.k)}`}>{rev.aiEval?.k || "-"}</div>
                          </td>
                          <td className="p-1 text-center align-middle border-r border-slate-100 bg-white">
                            <div className={`inline-flex items-center justify-center w-6 h-6 rounded border font-bold text-xs ${evalColor(rev.aiEval?.t)}`}>{rev.aiEval?.t || "-"}</div>
                          </td>
                          <td className="p-1 text-center align-middle border-r border-slate-200 bg-white">
                            <div className={`inline-flex items-center justify-center w-6 h-6 rounded border font-bold text-xs ${evalColor(rev.aiEval?.a)}`}>{rev.aiEval?.a || "-"}</div>
                          </td>
                          <td className="p-2 text-[10px] text-slate-500 whitespace-normal leading-tight align-top border-r border-slate-200 bg-white">
                            {rev.aiReason}
                          </td>
                          <td className="p-1 text-center align-middle border-r border-slate-100 bg-white">
                            <select value={rev.manualEval?.k || rev.aiEval?.k || ""} onChange={e => updateReview(s.id, { manualEval: { ...rev.manualEval, k: e.target.value } })} disabled={isAbsent} className={`border rounded px-1 py-1 text-xs font-bold outline-none cursor-pointer w-full text-center ${evalColor(rev.manualEval?.k || rev.aiEval?.k)}`}>
                              <option value="">-</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
                            </select>
                          </td>
                          <td className="p-1 text-center align-middle border-r border-slate-100 bg-white">
                            <select value={rev.manualEval?.t || rev.aiEval?.t || ""} onChange={e => updateReview(s.id, { manualEval: { ...rev.manualEval, t: e.target.value } })} disabled={isAbsent} className={`border rounded px-1 py-1 text-xs font-bold outline-none cursor-pointer w-full text-center ${evalColor(rev.manualEval?.t || rev.aiEval?.t)}`}>
                              <option value="">-</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
                            </select>
                          </td>
                          <td className="p-1 text-center align-middle bg-white">
                            <select value={rev.manualEval?.a || rev.aiEval?.a || ""} onChange={e => updateReview(s.id, { manualEval: { ...rev.manualEval, a: e.target.value } })} disabled={isAbsent} className={`border rounded px-1 py-1 text-xs font-bold outline-none cursor-pointer w-full text-center ${evalColor(rev.manualEval?.a || rev.aiEval?.a)}`}>
                              <option value="">-</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
                            </select>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* テキスト流し込み用 モーダルポップアップ */}
          {isPasteMode && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 z-[60]">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-800 text-white px-4 py-3 font-bold flex justify-between items-center">
                  <span><i className="fa-solid fa-paste mr-2"></i>振り返りコメント貼り付け</span>
                  <button onClick={() => setIsPasteMode(false)} className="text-white hover:text-gray-300">
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-4 overflow-y-auto">
                  <div className="bg-indigo-50 border border-indigo-200 text-indigo-800 text-sm p-3 rounded mb-4">
                    <p className="font-bold mb-1"><i className="fa-solid fa-info-circle"></i> スプレッドシートからのコピー＆ペースト</p>
                    <ul className="list-disc pl-5 space-y-1 text-xs">
                      <li>スプレッドシート等で、該当授業の「振り返り」の列のみを選択してコピーし、下に貼り付けてください。</li>
                      <li>名簿の上から順にテキストが反映されます。<strong>※欠席者は自動的にスキップされます。</strong></li>
                    </ul>
                  </div>
                  <textarea
                    autoFocus
                    value={pasteText}
                    onChange={e => setPasteText(e.target.value)}
                    className="w-full border border-gray-300 rounded p-3 text-sm font-mono whitespace-pre focus:ring-2 focus:ring-indigo-500 h-64"
                    placeholder="ここにテキストをペーストしてください..."
                  />
                </div>
                <div className="bg-gray-50 px-4 py-3 flex justify-end gap-2 border-t">
                  <button onClick={() => setIsPasteMode(false)} className="px-4 py-2 rounded border hover:bg-gray-100 text-sm font-medium">
                    キャンセル
                  </button>
                  <button onClick={handleApplyPaste} className="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold flex items-center gap-2">
                    <i className="fa-solid fa-check"></i> 反映する
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ==========================================
    // 2. 累積評価画面 (CumulativeScreen)
    // ==========================================
    function CumulativeScreen({ appData }) {
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || "");
      const activeClass = appData.classes.find(c => c.classId === activeClassId);
      const classLessons = (appData.lessons || []).filter(l => l.classId === activeClassId).sort((a,b)=>a.count - b.count);

      const getCellData = (lessonId, studentId) => {
        const reviews = appData.reviews || {};
        const rev = reviews[`${lessonId}_${studentId}`];
        if (!rev) return null;
        return {
          attendance: rev.attendance,
          eval: {
            k: rev.manualEval?.k || rev.aiEval?.k || "",
            t: rev.manualEval?.t || rev.aiEval?.t || "",
            a: rev.manualEval?.a || rev.aiEval?.a || ""
          }
        };
      };

      const exportCSV = () => {
        if (!activeClass) return;
        let csvContent = "\uFEFF"; 
        csvContent += `番号,氏名,ふりがな,性別,`;
        classLessons.forEach(l => {
          csvContent += `${l.title}(知),${l.title}(思),${l.title}(主),`;
        });
        csvContent += `最終評価(知),最終評価(思),最終評価(主),知A,知B,知C,思A,思B,思C,主A,主B,主C\n`;

        (activeClass.students || []).forEach(s => {
          let row = [s.number, s.name, s.furigana || '', s.gender || ''];
          let kA=0, kB=0, kC=0, tA=0, tB=0, tC=0, aA=0, aB=0, aC=0;
          
          classLessons.forEach(l => {
            const data = getCellData(l.id, s.id);
            if (data && data.attendance === '欠席') {
              row.push('欠', '欠', '欠');
            } else {
              row.push(data?.eval?.k || '', data?.eval?.t || '', data?.eval?.a || '');
              if (data && data.attendance !== '欠席') {
                if(data.eval.k==='A') kA++; else if(data.eval.k==='B') kB++; else if(data.eval.k==='C') kC++;
                if(data.eval.t==='A') tA++; else if(data.eval.t==='B') tB++; else if(data.eval.t==='C') tC++;
                if(data.eval.a==='A') aA++; else if(data.eval.a==='B') aB++; else if(data.eval.a==='C') aC++;
              }
            }
          });

          const calcFinal = (a, b, c) => {
            const total = a + b + c;
            if(total === 0) return "";
            const avg = (a*3 + b*2 + c*1) / total;
            if (avg >= 2.5) return "A";
            if (avg >= 1.5) return "B";
            return "C";
          };

          const finalK = calcFinal(kA, kB, kC);
          const finalT = calcFinal(tA, tB, tC);
          const finalA = calcFinal(aA, aB, aC);

          row.push(finalK, finalT, finalA, kA, kB, kC, tA, tB, tC, aA, aB, aC);
          csvContent += row.join(',') + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${activeClass.className}_累積評価_観点別.csv`;
        link.click();
      };

      if (!activeClass) return <div className="text-center p-8 text-slate-500">クラスがありません。</div>;

      const evalColorText = (ev) => {
        if (ev === 'A') return 'text-blue-600';
        if (ev === 'B') return 'text-emerald-600';
        if (ev === 'C') return 'text-orange-600';
        return 'text-slate-400';
      };

      return (
        <div className="space-y-4">
          <div className="flex flex-col items-center mb-4 print:hidden">
            <h2 className="text-xl sm:text-2xl font-bold text-slate-700 text-center tracking-wider">{activeClass.className} 累積評価一覧</h2>
          </div>

          <div className="bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex flex-col sm:flex-row justify-between items-center print-hidden gap-3">
            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex items-center gap-2">
                <span className="text-xs font-bold text-slate-500 mr-1 w-14 text-right whitespace-nowrap shrink-0"><i className="fa-solid fa-users mr-1"></i>クラス:</span>
                <ClassSelector classes={appData.classes} activeClassId={activeClassId} setActiveClassId={setActiveClassId} />
              </div>
              
              <div className="h-6 w-px bg-slate-200 hidden sm:block mx-1"></div>

              <span className="text-xs text-slate-500 font-bold hidden md:inline ml-2"><i className="fa-solid fa-circle-info text-blue-400"></i> 各回のセルには出欠状況と観点別評価が表示されます。</span>
            </div>
            <div className="flex gap-2 w-full sm:w-auto justify-end">
              <button onClick={exportCSV} className="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded text-sm font-bold transition-colors flex items-center gap-1.5 shadow-sm">
                <i className="fa-solid fa-file-csv"></i> 評価CSV出力
              </button>
              <button onClick={() => window.print()} className="bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 px-3 py-1.5 rounded text-sm font-bold transition-colors flex items-center gap-1.5 shadow-sm">
                <i className="fa-solid fa-print"></i> 印刷
              </button>
            </div>
          </div>

          <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 print-expand print:p-0 print:border-none print:shadow-none">
            {/* 印刷用のタイトル（画面上は見えない） */}
            <h2 className="hidden print:block text-lg font-bold mb-4 text-center">{activeClass.className} 累積評価一覧（観点別）</h2>

            <div className="overflow-x-auto print-expand pb-4">
              <table className="w-max text-sm border-collapse border border-slate-300 table-fixed">
                <thead className="bg-slate-50 text-slate-600 font-bold print:bg-white print:text-black">
                  <tr>
                    <th rowSpan={2} className="border border-slate-300 p-2 w-12 text-center align-middle shrink-0 text-sm print:text-[11px] print:w-8 print:p-1">番号</th>
                    {/* ★修正②: 氏名列を印刷時に潰れないように調整 (w-28, min-width指定) */}
                    <th rowSpan={2} className="border border-slate-300 p-2 w-32 min-w-[120px] text-center align-middle shrink-0 text-sm print:text-[11px] print:p-1 print:w-28 print:min-w-[110px]">氏名</th>
                    <th rowSpan={2} className="border border-slate-300 border-r-2 border-r-slate-400 p-2 w-12 text-center align-middle shrink-0 text-sm print:text-[11px] print:w-8 print:p-1">性別</th>
                    
                    {/* ★各授業の列を印刷時は非表示（print:hidden）にする */}
                    {classLessons.map((l, index) => (
                      <th key={l.id} rowSpan={2} className={`print:hidden border border-slate-300 ${index === classLessons.length - 1 ? 'border-r-2 border-r-slate-400' : ''} p-1 w-20 min-w-[72px] text-sm leading-tight text-center align-middle`}>
                        第{l.count}回 <br/><span className="font-normal text-[10px] text-slate-500">{l.date ? String(l.date).substring(5).replace('-','/') : '-'}</span>
                      </th>
                    ))}
                    
                    <th colSpan={3} className="border border-slate-300 border-r-2 border-r-slate-400 p-1.5 bg-slate-50 text-slate-700 shrink-0 text-center text-sm print:bg-transparent print:text-black print:text-xs print:p-1">最終評価</th>
                    <th colSpan={3} className="border border-slate-300 border-r-2 border-r-slate-400 p-1.5 bg-slate-50 text-slate-700 shrink-0 text-center text-sm print:bg-transparent print:text-black print:text-[10px] print:p-1">累積(知)</th>
                    <th colSpan={3} className="border border-slate-300 border-r-2 border-r-slate-400 p-1.5 bg-slate-50 text-slate-700 shrink-0 text-center text-sm print:bg-transparent print:text-black print:text-[10px] print:p-1">累積(思)</th>
                    <th colSpan={3} className="border border-slate-300 p-1.5 bg-slate-50 text-slate-700 shrink-0 text-center text-sm print:bg-transparent print:text-black print:text-[10px] print:p-1">累積(主)</th>
                  </tr>
                  <tr>
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-8 text-center print:bg-transparent print:text-black print:text-[10px]">知</th>
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-8 text-center print:bg-transparent print:text-black print:text-[10px]">思</th>
                    <th className="border border-slate-300 border-r-2 border-r-slate-400 p-1 bg-slate-50 text-slate-700 text-xs w-8 text-center print:bg-transparent print:text-black print:text-[10px]">主</th>
                    
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">A</th>
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">B</th>
                    <th className="border border-slate-300 border-r-2 border-r-slate-400 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">C</th>
                    
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">A</th>
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">B</th>
                    <th className="border border-slate-300 border-r-2 border-r-slate-400 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">C</th>
                    
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">A</th>
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">B</th>
                    <th className="border border-slate-300 p-1 bg-slate-50 text-slate-700 text-xs w-7 text-center print:bg-transparent print:text-black print:text-[10px]">C</th>
                  </tr>
                </thead>
                <tbody>
                  {(activeClass.students || []).map(s => {
                    let kA=0, kB=0, kC=0, tA=0, tB=0, tC=0, aA=0, aB=0, aC=0;
                    
                    const cells = classLessons.map((l, index) => {
                      const data = getCellData(l.id, s.id);
                      const isLastCell = index === classLessons.length - 1;
                      const borderRightClass = isLastCell ? 'border-r-2 border-r-slate-400' : '';

                      // ★ 各授業のセルも印刷時は非表示にする
                      if (!data) return <td key={l.id} className={`print:hidden border border-slate-300 ${borderRightClass} p-1 text-center text-slate-300 bg-white align-middle`}>-</td>;
                      
                      if (data.attendance !== '欠席') {
                        if(data.eval.k==='A') kA++; else if(data.eval.k==='B') kB++; else if(data.eval.k==='C') kC++;
                        if(data.eval.t==='A') tA++; else if(data.eval.t==='B') tB++; else if(data.eval.t==='C') tC++;
                        if(data.eval.a==='A') aA++; else if(data.eval.a==='B') aB++; else if(data.eval.a==='C') aC++;
                      }
                      
                      const attColorClass = data.attendance === '欠席' ? 'bg-red-50 text-red-800 border-red-200' : 
                                            data.attendance === '遅刻' ? 'bg-yellow-50 text-yellow-800 border-yellow-200' : 
                                            data.attendance === '早退' ? 'bg-orange-50 text-orange-800 border-orange-200' : 
                                            data.attendance === '保健室' ? 'bg-green-50 text-green-800 border-green-200' : 
                                            data.attendance === 'その他' ? 'bg-slate-100 text-slate-700 border-slate-300' : 
                                            data.attendance === '未' ? 'bg-slate-50 text-slate-400 border-slate-200 font-normal' : 
                                            'bg-white text-slate-600 border-slate-200';
                                            
                      const isAbsent = data.attendance === '欠席';

                      return (
                        <td key={l.id} className={`print:hidden border border-slate-300 ${borderRightClass} p-1.5 bg-white align-middle ${isAbsent ? 'bg-slate-50' : ''}`}>
                          <div className="flex flex-col items-center justify-center gap-1">
                            <span className={`px-1 rounded border text-[9px] font-bold leading-none w-full text-center py-0.5 ${attColorClass}`}>{data.attendance}</span>
                            {!isAbsent && (
                              <div className="flex gap-1.5 text-sm font-bold leading-none mt-1 justify-center tracking-widest">
                                 <span className={evalColorText(data.eval.k)}>{data.eval.k || '-'}</span>
                                 <span className={evalColorText(data.eval.t)}>{data.eval.t || '-'}</span>
                                 <span className={evalColorText(data.eval.a)}>{data.eval.a || '-'}</span>
                              </div>
                            )}
                          </div>
                        </td>
                      )
                    });

                    const calcFinal = (a, b, c) => {
                      const total = a + b + c;
                      if(total === 0) return "";
                      const avg = (a*3 + b*2 + c*1) / total;
                      if (avg >= 2.5) return "A";
                      if (avg >= 1.5) return "B";
                      return "C";
                    };

                    const finalK = calcFinal(kA, kB, kC);
                    const finalT = calcFinal(tA, tB, tC);
                    const finalA = calcFinal(aA, aB, aC);

                    return (
                      <tr key={s.id} className="hover:bg-slate-50 border-b border-slate-200 bg-white print:bg-white print:border-gray-400">
                        <td className="border border-slate-300 p-2 text-center text-slate-500 font-bold align-top bg-white print:text-black print:p-1 print:text-[11px]">{s.number}</td>
                        <td className="border border-slate-300 p-2 text-left bg-white align-top print:p-1">
                          <div className="flex flex-col">
                            <div className="flex items-center gap-1.5">
                              <span className="font-bold text-slate-700 text-sm whitespace-nowrap print:text-black print:text-[11px]">{s.name}</span>
                              {s.status !== "在籍" && <span className="text-[9px] bg-red-100 text-red-700 px-1 py-0.5 rounded font-bold border border-red-200 leading-none print:text-[8px] print:bg-transparent print:border-gray-500 print:text-black">{s.status}</span>}
                            </div>
                            <span className="text-[10px] text-slate-400 font-normal mt-0.5 whitespace-nowrap print:text-[8px] print:text-gray-500">{s.furigana}</span>
                          </div>
                        </td>
                        <td className="border border-slate-300 border-r-2 border-r-slate-400 p-2 text-center text-slate-600 text-sm align-top bg-white print:text-black print:p-1 print:text-[11px]">{s.gender}</td>
                        
                        {cells}

                        <td className={`border border-slate-300 p-1 font-bold text-center align-middle text-sm ${evalColorText(finalK)} bg-white print:text-[11px] print:text-black`}>{finalK}</td>
                        <td className={`border border-slate-300 p-1 font-bold text-center align-middle text-sm ${evalColorText(finalT)} bg-white print:text-[11px] print:text-black`}>{finalT}</td>
                        <td className={`border border-slate-300 border-r-2 border-r-slate-400 p-1 font-bold text-center align-middle text-sm ${evalColorText(finalA)} bg-white print:text-[11px] print:text-black`}>{finalA}</td>
                        
                        <td className="border border-slate-300 p-1 bg-white font-bold text-blue-800 text-center align-middle text-sm print:text-[11px] print:text-black">{kA || ''}</td>
                        <td className="border border-slate-300 p-1 bg-white font-bold text-emerald-800 text-center align-middle text-sm print:text-[11px] print:text-black">{kB || ''}</td>
                        <td className="border border-slate-300 border-r-2 border-r-slate-400 p-1 bg-white font-bold text-orange-800 text-center align-middle text-sm print:text-[11px] print:text-black">{kC || ''}</td>
                        
                        <td className="border border-slate-300 p-1 bg-white font-bold text-blue-800 text-center align-middle text-sm print:text-[11px] print:text-black">{tA || ''}</td>
                        <td className="border border-slate-300 p-1 bg-white font-bold text-emerald-800 text-center align-middle text-sm print:text-[11px] print:text-black">{tB || ''}</td>
                        <td className="border border-slate-300 border-r-2 border-r-slate-400 p-1 bg-white font-bold text-orange-800 text-center align-middle text-sm print:text-[11px] print:text-black">{tC || ''}</td>
                        
                        <td className="border border-slate-300 p-1 bg-white font-bold text-blue-800 text-center align-middle text-sm print:text-[11px] print:text-black">{aA || ''}</td>
                        <td className="border border-slate-300 p-1 bg-white font-bold text-emerald-800 text-center align-middle text-sm print:text-[11px] print:text-black">{aB || ''}</td>
                        <td className="border border-slate-300 p-1 bg-white font-bold text-orange-800 text-center align-middle text-sm print:text-[11px] print:text-black">{aC || ''}</td>
                      </tr>
                    )
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 評価基準設定画面 (RubricSettingsScreen)
    // ==========================================
    function RubricSettingsScreen({ appData, setAppData, showToast }) {
      const [activeGrade, setActiveGrade] = useState("1");
      
      const safeRubrics = appData.rubrics || { "1": DEFAULT_RUBRIC, "2": DEFAULT_RUBRIC, "3": DEFAULT_RUBRIC };
      const [rubricText, setRubricText] = useState(safeRubrics[activeGrade] || DEFAULT_RUBRIC);

      useEffect(() => {
        const currentRubrics = appData.rubrics || {};
        setRubricText(currentRubrics[activeGrade] || DEFAULT_RUBRIC);
      }, [activeGrade, appData.rubrics]);

      const saveRubric = () => {
        const currentRubrics = appData.rubrics || {};
        setAppData({
          ...appData,
          rubrics: { ...currentRubrics, [activeGrade]: rubricText }
        });
        showToast(`${activeGrade}年生の評価基準を保存しました。`, "success");
      };

      return (
        <div className="max-w-6xl mx-auto space-y-4">
          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="text-lg font-bold mb-4 text-slate-700 flex items-center gap-2">
              <i className="fa-solid fa-scale-balanced text-indigo-500"></i> AI評価基準（ルーブリック）の設定
            </h2>
            
            <div className="flex gap-2 mb-4 border-b border-slate-200 pb-2">
              {["1", "2", "3"].map(g => (
                <button key={g} onClick={() => setActiveGrade(g)} className={`px-4 py-2 text-sm font-bold rounded-t-lg transition-colors ${activeGrade === g ? 'bg-indigo-50 text-indigo-700 border-b-2 border-indigo-500' : 'text-slate-500 hover:bg-slate-50'}`}>
                  {g}年生
                </button>
              ))}
            </div>

            <p className="text-xs text-slate-500 mb-3 font-bold"><i className="fa-solid fa-lightbulb text-amber-500"></i> 各観点ごとに、Gemini APIに送信される判定条件を記述してください。</p>
            
            <div className="overflow-x-auto">
              <table className="w-full border-collapse border border-slate-300 shadow-sm rounded-lg overflow-hidden">
                <thead className="bg-indigo-50 text-indigo-900 text-sm">
                  <tr>
                    <th className="border border-slate-300 p-3 w-1/3 text-center"><i className="fa-solid fa-book mr-1 text-indigo-500"></i> 知識・技能 (知)</th>
                    <th className="border border-slate-300 p-3 w-1/3 text-center"><i className="fa-solid fa-brain mr-1 text-indigo-500"></i> 思考・判断・表現 (思)</th>
                    <th className="border border-slate-300 p-3 w-1/3 text-center"><i className="fa-solid fa-user-check mr-1 text-indigo-500"></i> 主体的に学習に取り組む態度 (主)</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td className="border border-slate-300 p-2 bg-white align-top">
                      <textarea
                        value={rubricText.knowledge}
                        onChange={e => setRubricText({...rubricText, knowledge: e.target.value})}
                        className="w-full h-72 border-none p-2 text-sm focus:ring-2 focus:ring-indigo-500 font-mono leading-relaxed outline-none resize-none"
                      />
                    </td>
                    <td className="border border-slate-300 p-2 bg-white align-top">
                      <textarea
                        value={rubricText.thinking}
                        onChange={e => setRubricText({...rubricText, thinking: e.target.value})}
                        className="w-full h-72 border-none p-2 text-sm focus:ring-2 focus:ring-indigo-500 font-mono leading-relaxed outline-none resize-none"
                      />
                    </td>
                    <td className="border border-slate-300 p-2 bg-white align-top">
                      <textarea
                        value={rubricText.attitude}
                        onChange={e => setRubricText({...rubricText, attitude: e.target.value})}
                        className="w-full h-72 border-none p-2 text-sm focus:ring-2 focus:ring-indigo-500 font-mono leading-relaxed outline-none resize-none"
                      />
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            
            <div className="flex justify-end mt-4">
              <button onClick={saveRubric} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded font-bold shadow-sm flex items-center gap-2">
                <i className="fa-solid fa-save"></i> 保存する
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. 生徒設定画面 (StudentSettingsScreen)
    // ==========================================
    function StudentSettingsScreen({ appData, setAppData, showToast }) {
      const safeSettings = appData.settings || { grades: { 1: 1, 2: 0, 3: 0 } };
      const [gradesConfig, setGradesConfig] = useState(safeSettings.grades || { 1: 1, 2: 0, 3: 0 });
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || "");
      const [bulkImport, setBulkImport] = useState({ show: false, text: '' });

      const activeClass = appData.classes.find(c => c.classId === activeClassId);

      const applyConfig = () => {
        let newClasses = [...appData.classes];
        [1, 2, 3].forEach(g => {
          const count = gradesConfig[g] || 0;
          for(let c=1; c<=count; c++) {
            const cId = `${g}-${c}`;
            if(!newClasses.find(cls => cls.classId === cId)) {
